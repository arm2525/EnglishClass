<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>คนเก่งติวภาษาอังกฤษ ป.3</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Anuphan:wght@300;400;600;700&display=swap');
        body { font-family: 'Anuphan', sans-serif; }
        .animate-fade { animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const GOOGLE_SHEET_URL = "https://script.google.com/macros/s/AKfycbzWyJ9tOyJfZwXTT3hiK0tf9gFyApLngELhJIihi5gOxVPwcYxbDjlSVw_yMz6XssIZfw/exec"; 

        // --- ไอคอนแบบ SVG ---
        const Icon = ({ name, className = "" }) => {
            const icons = {
                Check: <path d="M20 6 9 17l-5-5" />,
                Trophy: <path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6M18 9h1.5a2.5 2.5 0 0 0 0-5H18M4 22h16M10 14.66V17c0 .55-.45 1-1 1H7.22c-.4 0-.72.32-.72.72v.28c0 .3.25.55.55.55H17c.3 0 .55-.25.55-.55v-.28c0-.4-.32-.72-.72-.72H15c-.55 0-1-.45-1-1v-2.34M12 15a6 6 0 0 0 6-6V3H6v6a6 6 0 0 0 6 6z" />,
                Loader: <path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83" />,
                ArrowRight: <path d="M5 12h14M12 5l7 7-7 7" />
            };
            return (
                <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {icons[name]}
                </svg>
            );
        };

        const App = () => {
            const [questionsPool, setQuestionsPool] = useState([]);
            const [isLoading, setIsLoading] = useState(true);
            const [currentStep, setCurrentStep] = useState('start');
            const [studentName, setStudentName] = useState('');
            const [level, setLevel] = useState(1);
            const [qIndex, setQIndex] = useState(0);
            const [score, setScore] = useState(0);
            const [lvlScore, setLvlScore] = useState(0);
            const [selected, setSelected] = useState(null);
            const [isAnswered, setIsAnswered] = useState(false);

            // 1. โหลดคำถามจาก Sheet
            useEffect(() => {
                fetch(`${GOOGLE_SHEET_URL}?action=getQuestions`)
                    .then(res => res.json())
                    .then(data => { setQuestionsPool(data); setIsLoading(false); })
                    .catch(() => alert("โหลดคำถามไม่สำเร็จ!"));
            }, []);

            // 2. จัดกลุ่มเลเวล
            const levelsConfig = useMemo(() => {
                const groups = {};
                questionsPool.forEach(q => {
                    if (!groups[q.level]) groups[q.level] = { id: q.level, questions: [] };
                    groups[q.level].questions.push(q);
                });
                return Object.values(groups).sort((a,b) => a.id - b.id);
            }, [questionsPool]);

            const currentLevelData = levelsConfig.find(l => l.id === level);
            const currentQuestion = currentLevelData?.questions[qIndex];

            // 3. ตรวจสอบคะแนนเดิม
            const checkProgress = async () => {
                if (!studentName) return alert("ใส่ชื่อก่อนนะลูก");
                setIsLoading(true);
                const res = await fetch(`${GOOGLE_SHEET_URL}?action=getProgress&name=${encodeURIComponent(studentName)}`);
                const data = await res.json();
                if (data.found) {
                    setLevel(data.lastLevel);
                    setScore(data.totalScore);
                }
                setCurrentStep('quiz');
                setIsLoading(false);
            };

            const handleAnswer = (idx) => {
                if (isAnswered) return;
                setSelected(idx);
                setIsAnswered(true);
                if (idx === currentQuestion.correct) {
                    setScore(s => s + 1);
                    setLvlScore(s => s + 1);
                }
            };

            const nextQuestion = async () => {
                if (qIndex < currentLevelData.questions.length - 1) {
                    setQIndex(qIndex + 1);
                    setSelected(null);
                    setIsAnswered(false);
                } else {
                    // จบเลเวล -> บันทึกคะแนน
                    await fetch(GOOGLE_SHEET_URL, {
                        method: 'POST',
                        mode: 'no-cors',
                        body: JSON.stringify({ studentName, levelCompleted: level, levelScore: lvlScore, totalScore: score + (selected === currentQuestion.correct ? 1 : 0) })
                    });
                    setCurrentStep('tutorial');
                }
            };

            if (isLoading) return <div className="flex h-screen items-center justify-center font-bold text-indigo-600"><Icon name="Loader" className="animate-spin mr-2"/> กำลังเตรียมบทเรียน...</div>;

            return (
                <div className="max-w-md mx-auto p-4 min-h-screen flex flex-col justify-center">
                    {currentStep === 'start' && (
                        <div className="bg-white p-8 rounded-3xl shadow-xl text-center animate-fade">
                            <h1 className="text-3xl font-black text-indigo-600 mb-6">คนเก่งติวอังกฤษ</h1>
                            <input type="text" placeholder="ชื่อเล่นของลูก..." className="w-full p-4 border-2 rounded-2xl mb-4 text-center text-xl font-bold" 
                                value={studentName} onChange={e => setStudentName(e.target.value)} />
                            <button onClick={() => setCurrentStep('quiz')} className="w-full py-4 bg-indigo-600 text-white rounded-2xl font-bold mb-2">เริ่มใหม่เลย</button>
                            <button onClick={checkProgress} className="w-full py-4 border-2 border-indigo-100 text-indigo-600 rounded-2xl font-bold">เรียนต่อจากเดิม</button>
                        </div>
                    )}

                    {currentStep === 'quiz' && currentQuestion && (
                        <div className="bg-white p-6 rounded-3xl shadow-xl animate-fade">
                            <div className="flex justify-between text-xs font-bold text-slate-400 mb-4 uppercase">
                                <span>Level {level}</span>
                                <span>ข้อ {qIndex + 1}/{currentLevelData.questions.length}</span>
                            </div>
                            <div className="bg-slate-50 p-6 rounded-2xl mb-6 text-center text-xl font-bold text-slate-800">
                                {currentQuestion.q}
                            </div>
                            <div className="space-y-3 mb-6">
                                {currentQuestion.options.map((opt, i) => (
                                    <button key={i} onClick={() => handleAnswer(i)} disabled={isAnswered}
                                        className={`w-full p-4 rounded-xl text-left font-bold transition-all border-2 ${
                                            !isAnswered ? 'border-slate-100 hover:border-indigo-500' :
                                            i === currentQuestion.correct ? 'bg-emerald-50 border-emerald-500 text-emerald-700' :
                                            i === selected ? 'bg-rose-50 border-rose-500 text-rose-700' : 'border-slate-50 opacity-50'
                                        }`}>
                                        {opt}
                                    </button>
                                ))}
                            </div>
                            {isAnswered && (
                                <div className="p-4 bg-indigo-50 rounded-xl mb-4 text-sm animate-fade">
                                    <p className="font-bold text-indigo-700">💡 คำอธิบาย:</p>
                                    <p className="text-indigo-900">{currentQuestion.exp}</p>
                                </div>
                            )}
                            <button onClick={nextQuestion} disabled={!isAnswered}
                                className={`w-full py-4 rounded-2xl font-bold flex items-center justify-center gap-2 ${isAnswered ? 'bg-slate-900 text-white' : 'bg-slate-100 text-slate-300'}`}>
                                ข้อต่อไป <Icon name="ArrowRight" />
                            </button>
                        </div>
                    )}

                    {currentStep === 'tutorial' && (
                        <div className="bg-white p-8 rounded-3xl shadow-xl text-center animate-fade">
                            <Icon name="Trophy" className="mx-auto text-yellow-400 w-20 h-20 mb-4" />
                            <h2 className="text-2xl font-black text-slate-800 mb-2">เก่งมากครับลูก!</h2>
                            <p className="text-slate-500 mb-6">จบเลเวล {level} แล้ว ไปต่อกันเลยไหม?</p>
                            <button onClick={() => { setLevel(level + 1); setQIndex(0); setLvlScore(0); setSelected(null); setIsAnswered(false); setCurrentStep('quiz'); }}
                                className="w-full py-4 bg-indigo-600 text-white rounded-2xl font-bold">
                                ลุยเลเวล {level + 1} ต่อ!
                            </button>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
