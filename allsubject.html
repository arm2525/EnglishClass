<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>คนเก่งติวทุกวิชา P3-P6</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Anuphan:wght@300;400;600;700&display=swap');
        body { font-family: 'Anuphan', sans-serif; background: #f8fafc; }
        .animate-pop { animation: pop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes pop { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        const GOOGLE_SHEET_URL = "https://script.google.com/macros/s/AKfycby7Zwj2wJg0vfJb7W-TeqSWhVqgUml2zKtqvDtn7gxRLus1q1FWzjz4lCZh--GN7hDg/exec"; 

        const App = () => {
            const [currentStep, setCurrentStep] = useState('start');
            const [grade, setGrade] = useState('P3');
            const [subject, setSubject] = useState('English');
            const [studentName, setStudentName] = useState('');
            const [questionsPool, setQuestionsPool] = useState([]);
            const [isLoading, setIsLoading] = useState(false);
            const [level, setLevel] = useState(1);
            const [qIndex, setQIndex] = useState(0);
            const [score, setScore] = useState(0);
            const [lvlScore, setLvlScore] = useState(0);
            const [isAnswered, setIsAnswered] = useState(false);
            const [userInput, setUserInput] = useState('');
            const [selected, setSelected] = useState(null);
            const [answersLog, setAnswersLog] = useState([]);

            const loadData = async (isResume) => {
                if (!studentName) return alert("กรุณาใส่ชื่อก่อนครับ");
                setIsLoading(true);
                try {
                    const qRes = await fetch(`${GOOGLE_SHEET_URL}?action=getQuestions&grade=${grade}&subject=${subject}`);
                    const qData = await qRes.json();
                    setQuestionsPool(qData);
                    if (isResume) {
                        const pRes = await fetch(`${GOOGLE_SHEET_URL}?action=getProgress&name=${studentName}&grade=${grade}&subject=${subject}`);
                        const pData = await pRes.json();
                        if (pData.found) { setLevel(pData.lastLevel); setScore(pData.totalScore); }
                    }
                    setCurrentStep('quiz');
                } catch (e) { alert("เกิดข้อผิดพลาดในการโหลดข้อมูล"); }
                setIsLoading(false);
            };

            const levelsConfig = useMemo(() => {
                const groups = {};
                questionsPool.forEach(q => {
                    if (!groups[q.level]) groups[q.level] = { id: q.level, questions: [] };
                    groups[q.level].questions.push(q);
                });
                return Object.values(groups).sort((a,b) => a.id - b.id);
            }, [questionsPool]);

            const currentLevelData = levelsConfig.find(l => l.id === level);
            const currentQuestion = currentLevelData?.questions[qIndex];

            const handleAnswer = (val) => {
                if (isAnswered) return;
                setIsAnswered(true);
                let isCorrect = false;
                let userDisplayAnswer = val;

                if (currentQuestion.type === 'choice') {
                    setSelected(val);
                    isCorrect = val === currentQuestion.correct;
                    userDisplayAnswer = currentQuestion.options[val];
                } else {
                    isCorrect = val.toString().toLowerCase() === currentQuestion.correct.toString().toLowerCase();
                }

                const log = {
                    question: currentQuestion.q,
                    userAnswer: userDisplayAnswer,
                    correctAnswer: currentQuestion.type === 'choice' ? currentQuestion.options[currentQuestion.correct] : currentQuestion.correct,
                    isCorrect
                };
                setAnswersLog(prev => [...prev, log]);
                if (isCorrect) { setScore(s => s + 1); setLvlScore(s => s + 1); }
            };

            const submitAndNext = async () => {
                if (qIndex < currentLevelData.questions.length - 1) {
                    setQIndex(qIndex + 1); setSelected(null); setUserInput(''); setIsAnswered(false);
                } else {
                    setIsLoading(true);
                    await fetch(GOOGLE_SHEET_URL, {
                        method: 'POST', mode: 'no-cors',
                        body: JSON.stringify({ studentName, grade, subject, levelCompleted: level, levelScore: lvlScore, totalScore: score, answersLog })
                    });
                    setAnswersLog([]); setLvlScore(0); setCurrentStep('tutorial'); setIsLoading(false);
                }
            };

            if (isLoading) return <div className="flex h-screen items-center justify-center font-bold text-indigo-600 animate-pulse">กำลังจัดการข้อมูลให้คนเก่ง...</div>;

            return (
                <div className="max-w-md mx-auto p-4 min-h-screen flex flex-col justify-center">
                    {currentStep === 'start' && (
                        <div className="bg-white p-8 rounded-[2.5rem] shadow-2xl animate-pop space-y-4">
                            <h1 className="text-3xl font-black text-center text-indigo-600">คนเก่งติวรอบด้าน</h1>
                            <div className="space-y-2">
                                <label className="text-xs font-bold text-slate-400 uppercase tracking-widest">เลือกระดับชั้น</label>
                                <select value={grade} onChange={e => setGrade(e.target.value)} className="w-full p-4 bg-slate-50 border-2 rounded-2xl font-bold">
                                    <option value="P3">ป.3 (Grade 3)</option><option value="P4">ป.4 (Grade 4)</option><option value="P5">ป.5 (Grade 5)</option><option value="P6">ป.6 (Grade 6)</option>
                                </select>
                            </div>
                            <div className="space-y-2">
                                <label className="text-xs font-bold text-slate-400 uppercase tracking-widest">เลือกวิชา</label>
                                <select value={subject} onChange={e => setSubject(e.target.value)} className="w-full p-4 bg-slate-50 border-2 rounded-2xl font-bold">
                                    <option value="English">ภาษาอังกฤษ</option><option value="Math">คณิตศาสตร์</option><option value="Thai">ภาษาไทย</option><option value="Science">วิทยาศาสตร์</option>
                                </select>
                            </div>
                            <input type="text" placeholder="ชื่อเล่น..." className="w-full p-4 border-2 rounded-2xl text-center text-xl font-bold" value={studentName} onChange={e => setStudentName(e.target.value)} />
                            <button onClick={() => loadData(false)} className="w-full py-4 bg-indigo-600 text-white rounded-2xl font-black shadow-lg shadow-indigo-200">เริ่มติวใหม่</button>
                            <button onClick={() => loadData(true)} className="w-full py-4 border-2 border-indigo-100 text-indigo-600 rounded-2xl font-bold">ติวต่อจากเดิม</button>
                        </div>
                    )}

                    {currentStep === 'quiz' && currentQuestion && (
                        <div className="bg-white p-6 rounded-[2.5rem] shadow-xl animate-pop">
                            <div className="flex justify-between items-center mb-6">
                                <span className="px-3 py-1 bg-indigo-50 text-indigo-600 rounded-full text-xs font-black">{grade} • {subject}</span>
                                <span className="text-slate-400 font-bold text-xs">ข้อ {qIndex + 1}/{currentLevelData.questions.length}</span>
                            </div>
                            <div className="bg-slate-50 p-8 rounded-3xl mb-6 text-center text-xl font-bold text-slate-800 leading-relaxed italic border border-slate-100">"{currentQuestion.q}"</div>
                            
                            {currentQuestion.type === 'choice' ? (
                                <div className="grid gap-3">
                                    {currentQuestion.options.map((opt, i) => (
                                        <button key={i} onClick={() => handleAnswer(i)} disabled={isAnswered} className={`w-full p-4 rounded-2xl text-left font-bold border-2 transition-all ${!isAnswered ? 'border-slate-100 hover:border-indigo-500' : i === currentQuestion.correct ? 'bg-emerald-50 border-emerald-500 text-emerald-700' : i === selected ? 'bg-rose-50 border-rose-500 text-rose-700' : 'opacity-40 border-slate-50'}`}>{opt}</button>
                                    ))}
                                </div>
                            ) : (
                                <div className="space-y-4">
                                    <input type="text" value={userInput} disabled={isAnswered} onChange={e => setUserInput(e.target.value)} className={`w-full p-5 border-2 rounded-2xl text-center text-2xl font-black focus:outline-none ${isAnswered ? (userInput.toLowerCase() === currentQuestion.correct ? 'bg-emerald-50 border-emerald-500' : 'bg-rose-50 border-rose-500') : 'border-indigo-100 focus:border-indigo-500'}`} placeholder="พิมพ์คำตอบ..." />
                                    {!isAnswered && <button onClick={() => handleAnswer(userInput.trim())} className="w-full py-4 bg-indigo-600 text-white rounded-2xl font-bold shadow-lg">ส่งคำตอบ</button>}
                                </div>
                            )}

                            {isAnswered && (
                                <div className="mt-6 p-5 bg-amber-50 rounded-2xl border border-amber-100 animate-pop">
                                    <div className="text-amber-700 font-black text-xs uppercase mb-1">💡 คำอธิบาย</div>
                                    <p className="text-slate-600 text-sm font-medium">{currentQuestion.exp}</p>
                                    <button onClick={submitAndNext} className="w-full mt-4 py-4 bg-slate-900 text-white rounded-xl font-bold">ข้อต่อไป →</button>
                                </div>
                            )}
                        </div>
                    )}

                    {currentStep === 'tutorial' && (
                        <div className="bg-white p-10 rounded-[2.5rem] shadow-2xl text-center animate-pop space-y-6">
                            <div className="text-6xl">🏆</div>
                            <h2 className="text-3xl font-black text-slate-800">สุดยอดเลเวล {level}!</h2>
                            <p className="text-slate-500 font-bold italic">"ฝึกฝนบ่อยๆ จะเก่งขึ้นแน่นอนครับลูก"</p>
                            <button onClick={() => { setLevel(level + 1); setQIndex(0); setUserInput(''); setIsAnswered(false); setCurrentStep('quiz'); }} className="w-full py-5 bg-indigo-600 text-white rounded-3xl font-black text-xl shadow-xl">ลุยเลเวล {level + 1} ต่อ!</button>
                            <button onClick={() => setCurrentStep('start')} className="text-slate-400 font-bold hover:text-indigo-600">กลับหน้าหลัก</button>
                        </div>
                    )}
                </div>
            );
        };
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
